<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <script>
const path = window.location.pathname;
// ❌ NIET redirecten als het een bestand is
if (path.match(/\.(jpg|jpeg|png|gif|webp|css|js|ico)$/i)) {
  // laat gewoon laden
} else {
  // ✅ normale redirect
  const code = path.substring(1); // verwijder /
  window.location.replace(`/object.html?code=${code}`);
}
  </script>
</head>
<body>
  <p>Doorsturen...</p>
</body>
</html>
