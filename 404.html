<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
<script>
const path = window.location.pathname;

// alles na laatste slash
const lastPart = path.split("/").pop();

// ❌ NIET redirecten als:
// - het een bestand is (met .extensie)
// - of in /images/ zit
if (
  path.startsWith("/images/") ||
  lastPart.includes(".")
) {
  // niets doen → laat afbeelding laden
} else {
  // ✅ alleen echte codes redirecten
  const code = lastPart;
  window.location.replace(`/object.html?code=${code}`);
}
</script>
</head>
<body>
  <p>Doorsturen...</p>
</body>
</html>
