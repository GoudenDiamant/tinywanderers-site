<!DOCTYPE html>
<html>
<head>
  <title>Tiny Wanderers - Specifieke Tiny Wanderer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <nav>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/track">Registreer je vondst</a></li>
        <li><a href="/donations">Donaties</a></li>
        <li><a href="/gallery">Galerij</a></li>
    </ul>
  </nav>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .card {
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 18px;
      margin: 5px 0;
    }

    .message {
      font-style: italic;
      color: #555;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="navbar">
    <input type="text" id="searchInput" placeholder="Zoek je Tiny Wanderer (bijv. TW-001)">
    <button onclick="searchCode()">Zoek</button>
      <p style="text-align:center; font-size: 14px;">
  🔍   Vul de code in die op je Tiny Wanderer staat
      </p>
  </div>
  <div class="container">
    <h1>🌍 Tiny Wanderers - Specifieke Tiny Wanderer</h1>
    <div id="content">
      <p>Laden...</p>
    </div>
  </div>

<script>
const sheetID = "1hOh85pwC5XPk_brdeRLonqR1YYDOEadiHbaLAdaadmw";

const responsesURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Form Responses 1`;
const objectsURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Objects`;

const params = new URLSearchParams(window.location.search);
const code = params.get("code")?.toUpperCase();

const content = document.getElementById("content");


// 🔧 JSON parser
function parseData(data) {
  const jsonString = data.match(/google\.visualization\.Query\.setResponse\((.*)\);/)[1];
  return JSON.parse(jsonString).table.rows;
}

// 🔧 datum parser (werkt voor ALLES)
function parseDate(dateObj) {
  if (!dateObj) return null;

  if (dateObj instanceof Date) return dateObj;

  if (typeof dateObj === "string" && dateObj.startsWith("Date(")) {
    const parts = dateObj.match(/\d+/g);
    return new Date(parts[0], parts[1], parts[2]);
  }

  if (typeof dateObj === "string" && dateObj.includes("-")) {
    const [dd, mm, yyyy] = dateObj.split("-");
    return new Date(yyyy, mm - 1, dd);
  }

  return new Date(dateObj);
}

// 🎨 datum formatter
function formatDate(dateObj) {
  const d = parseDate(dateObj);
  if (!d || isNaN(d)) return "Onbekend";

  const day = d.getDate();
  const month = d.getMonth() + 1;
  const year = d.getFullYear();

  return `${day}-${month}-${year}`;
}

if (!code) {
  content.innerHTML = "<p>Geen code opgegeven.</p>";
} else {

  Promise.all([
    fetch(responsesURL).then(r => r.text()),
    fetch(objectsURL).then(r => r.text())
  ])
  .then(([responsesText, objectsText]) => {

    const responses = parseData(responsesText);
    const objects = parseData(objectsText);
// 📍 entries
    const entries = responses.filter(r => 
      r.c[1]?.v?.toString().toUpperCase().startsWith(code)
    );

//Afstanden berekenen
  
  entries.sort((a, b) => {
    return new Date(a.c[0]?.v) - new Date(b.c[0]?.v);
  });
  
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // straal aarde in km

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) ** 2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}
//Afstand Berkenen 2    
let totalDistance = 0;

for (let i = 1; i < entries.length; i++) {
  const prev = entries[i - 1];
  const curr = entries[i];

  const lat1 = parseFloat(prev.c[6]?.v);
  const lon1 = parseFloat(prev.c[7]?.v);

  const lat2 = parseFloat(curr.c[6]?.v);
  const lon2 = parseFloat(curr.c[7]?.v);

  if (!lat1 || !lon1 || !lat2 || !lon2) continue;

  totalDistance += getDistance(lat1, lon1, lat2, lon2);
}

// afronden
totalDistance = Math.round(totalDistance);

    // 📦 object info
    const obj = objects.find(r =>
      r.c[0]?.v?.toString().toUpperCase() === code
    );

    if (!obj && entries.length === 0) {
      content.innerHTML = "<p>❌ Deze code bestaat niet.</p>";
      return;
    }

    // 📦 object data
    const name = obj?.c[1]?.v || "Onbekend";
    const status = obj?.c[2]?.v || "Onbekend";
    
    entries.sort((a, b) => parseDate(a.c[3]?.v) - parseDate(b.c[3]?.v));
    const start = parseDate(entries[0]?.c[3]?.v);
    const photo = obj?.c[4]?.v || "";

    // 🧮 dagen berekenen
    let days = "Onbekend";
    
    if (start && !isNaN(start)) {
      const now = new Date();
      const diffTime = now - start;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      days = diffDays === 1 ? "1 dag" : diffDays + " dagen";
    }

    // 🔄 sorteer entries op datum
    entries.sort((a, b) => parseDate(a.c[3]?.v) - parseDate(b.c[3]?.v));

    // 📊 stats
    const total = entries.length;
    const firstDate = entries[0]?.c[3]?.v;
    const lastDate = entries[entries.length - 1]?.c[3]?.v;

    const latestEntry = entries[entries.length - 1];
    const currentStatus = latestEntry?.c[5]?.v || "Onbekend";

    let statusIcon = "🌍";
    if (currentStatus?.toLowerCase().includes("logeren")) statusIcon = "🏠";
    if (currentStatus?.toLowerCase().includes("verhuisd")) statusIcon = "🏡";
    if (currentStatus?.toLowerCase().includes("vermist")) statusIcon = "❓";

    // 🎨 HTML
    let html = `
      <div class="card">
        <h2>${name} (${code})</h2>
        ${photo ? `<img src="${photo}">` : ""}
        <div class="stat">🕒 Onderweg: ${days}</div>
        <div class="stat">🧭 Afstand afgelegd: ${totalDistance} km</div>
        <div class="stat">${statusIcon} Status: ${currentStatus}</div>
        <div class="stat">🔁 Aantal vondsten: ${total}</div>
        <div class="stat">📅 Eerste vondst: ${formatDate(firstDate)}</div>
        <div class="stat">📅 Laatste vondst: ${formatDate(lastDate)}</div>
      </div>
    `;

    html += `<div class="card"><h3>📍 Reisgeschiedenis</h3>`;

    entries.forEach(entry => {
      const location = entry.c[2]?.v || "Onbekend";
      const date = entry.c[3]?.v;
      const message = entry.c[4]?.v || "";

      html += `
        <div class="card">
          <div><strong>📍 ${location}</strong></div>
          <div>📅 ${formatDate(date)}</div>
          ${message ? `<div class="message">💬 ${message}</div>` : ""}
        </div>
      `;
    });

    html += `</div>`;

    content.innerHTML = html;

  })
  .catch(err => {
    content.innerHTML = "<p>⚠️ Fout bij laden van data.</p>";
    console.error(err);
  });
}
</script>
<script>
  function searchCode() {
    let input = document.getElementById("searchInput").value.trim().toUpperCase();
  
    // basis validatie
    if (!input.startsWith("TW-")) {
      alert("Gebruik een code die start met 'TW-'.");
      return;
    }
  
    // alleen eerste deel gebruiken (TW-001)
    const shortCode = input.split("-").slice(0,2).join("-");
  
    window.location.href = "/" + shortCode;
  }
  </script>
   <script>
  document.getElementById("searchInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      searchCode();
    }
  });
</script>

</body>
</html>
