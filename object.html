<!DOCTYPE html>
<html>
<head>
  <title>Tiny Wanderer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/track">Registreer je vondst</a></li>
    </ul>
  </nav>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: auto;
      background: #B1CFF0;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .stat {
      font-size: 18px;
      margin: 5px 0;
    }

    .message {
      font-style: italic;
      color: #555;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🌍 Tiny Wanderer</h1>
    <div id="content">
      <p>Laden...</p>
    </div>
  </div>

<script>
const sheetID = "1hOh85pwC5XPk_brdeRLonqR1YYDOEadiHbaLAdaadmw";

const responsesURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Form Responses 1`;
const objectsURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Objects`;

const params = new URLSearchParams(window.location.search);
const code = params.get("code")?.toUpperCase();

const content = document.getElementById("content");

// helper
function parseData(data) {
  const jsonString = data.match(/google\.visualization\.Query\.setResponse\((.*)\);/)[1];
  return JSON.parse(jsonString).table.rows;
}

if (!code) {
  content.innerHTML = "<p>Geen code opgegeven.</p>";
} else {

  Promise.all([
    fetch(responsesURL).then(r => r.text()),
    fetch(objectsURL).then(r => r.text())
  ])
  .then(([responsesText, objectsText]) => {

    const responses = parseData(responsesText);
    const objects = parseData(objectsText);

    // 🔍 entries (formulier data)
    const entries = responses.filter(r => 
      r.c[1]?.v?.toString().toUpperCase().startsWith(code)
    );

    // 🔍 object info
    const obj = objects.find(r =>
      r.c[0]?.v?.toString().toUpperCase() === code
    );
    
    if (!obj && entries.length === 0) {
      content.innerHTML = "<p>❌ Deze code bestaat niet.</p>";
      return;
    }

    // 📦 object data
    const name = obj?.c[1]?.v || "Onbekende Tiny Wanderer";
    const status = obj?.c[2]?.v || "Onbekend";
    const startDate = obj?.c[3]?.v || null;
    const photo = obj?.c[4]?.v || "";

    // 🧮 dagen berekenen ((niet heel erg) robuust)
    let days = "Onbekend";
    
    // Huidige datum
    const nu = new Date();
    
    // Verschil in milliseconden
    const verschilTijd = nu - startDate;
    
    // Omrekenen naar dagen
    const verstrekenDagen = Math.floor(verschilTijd / (1000 * 60 * 60 * 24));
    
    // Tekstversie
    days = verstrekenDagen + " dagen";


    // 📊 stats
    const total = entries.length;
    const firstDate = entries[0]?.c[2]?.v;
    const lastDate = entries[entries.length - 1]?.c[2]?.v;
    
    const latestEntry = entries[entries.length - 1];
    const currentStatus = latestEntry?.c[5]?.v || "Onbekend";

    let statusIcon = "🌍";

    if (currentStatus.includes("logeren")) statusIcon = "🏠";
    if (currentStatus.includes("Verhuisd")) statusIcon = "🏡";
    if (currentStatus.includes("Vermist")) statusIcon = "❓";
    // 🎨 HTML
    let html = `
      <div class="card">
        <h2>${name} (${code})</h2>
        ${photo ? `<img src="${photo}">` : ""}
        <div class="stat">📍 Status: ${status}</div>
        <div class="stat">🕒 Onderweg: ${days}</div>
        <div class="stat">${statusIcon} Status: ${currentStatus}</div>
        <div class="stat">🔁 Aantal vondsten: ${total}</div>
        <div class="stat">📅 Eerste vondst: ${firstDate || "Onbekend"}</div>
        <div class="stat">📅 Laatste vondst: ${lastDate || "Onbekend"}</div>
      </div>
    `;

    html += `<div class="card"><h3>📍 Reisgeschiedenis</h3>`;

    entries.forEach(entry => {
      const location = entry.c[2]?.v || "Onbekend";
      const date = entry.c[3]?.v || "Onbekend";
      const message = entry.c[4]?.v || "";

      html += `
        <div class="card">
          <div><strong>📍 ${location}</strong></div>
          <div>📅 ${date}</div>
          ${message ? `<div class="message">💬 ${message}</div>` : ""}
        </div>
      `;
    });

    html += `</div>`;

    content.innerHTML = html;

  })
  .catch(err => {
    content.innerHTML = "<p>⚠️ Fout bij laden van data.</p>";
    console.error(err);
  });
}
</script>

</body>
</html>
