<script>
const sheetID = "1hOh85pwC5XPk_brdeRLonqR1YYDOEadiHbaLAdaadmw";

const responsesURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Formulierreacties 1`;
const objectsURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=Objects`;

function parseData(data) {
  const jsonString = data.match(/google\.visualization\.Query\.setResponse\((.*)\);/)[1];
  return JSON.parse(jsonString).table.rows;
}

// 🌍 afstand functie
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) ** 2;

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

// 📅 dagen berekenen
function calcDays(startDate) {
  if (!startDate) return "Onbekend";

  let start;

  // 📅 Google Date(...) formaat
  if (typeof startDate === "string" && startDate.includes("Date(")) {
    const parts = startDate.match(/\d+/g);
    start = new Date(parts[0], parts[1], parts[2]);
  }

  // 📅 ISO formaat (2026-04-21)
  else if (typeof startDate === "string" && startDate.includes("-")) {
    const parts = startDate.split("-");
    if (parts.length === 3) {
      start = new Date(parts[0], parts[1] - 1, parts[2]);
    }
  }

  // 📅 al een Date object
  else {
    start = new Date(startDate);
  }

  if (!start || isNaN(start)) return "Onbekend";

  const now = new Date();
  const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));

  return diff + " dagen";
}

const gallery = document.getElementById("gallery");

Promise.all([
  fetch(responsesURL).then(r => r.text()),
  fetch(objectsURL).then(r => r.text())
])
.then(([responsesText, objectsText]) => {

  const responses = parseData(responsesText);
  const objects = parseData(objectsText);

  let wanderers = [];

  objects.forEach(wanderers.push({
  code,
  name,
  photo,
  distance: totalDistance,
  days: parseInt(days) || 0
});
    );

    entries.sort((a, b) => new Date(a.c[0]?.v) - new Date(b.c[0]?.v));

    // 🧭 afstand berekenen
    let totalDistance = 0;

    for (let i = 1; i < entries.length; i++) {
      const prev = entries[i - 1];
      const curr = entries[i];

      const lat1 = parseFloat(prev.c[6]?.v);
      const lon1 = parseFloat(prev.c[7]?.v);
      const lat2 = parseFloat(curr.c[6]?.v);
      const lon2 = parseFloat(curr.c[7]?.v);

      if (!lat1 || !lon1 || !lat2 || !lon2) continue;

      totalDistance += getDistance(lat1, lon1, lat2, lon2);
    }

    totalDistance = Math.round(totalDistance);
    function renderGallery() {
      let html = "";
    
      wanderers.forEach(w => {
        html += `
          <div class="card" onclick="window.location.href='/object?code=${w.code}'">
            ${w.photo ? `<img src="${w.photo}">` : ""}
            <h3>${w.name}</h3>
            <div class="stat">🧭 ${w.distance} km</div>
            <div class="stat">🕒 ${w.days} dagen</div>
            <div class="small">${w.code}</div>
          </div>
        `;
      });

  renderGallery();
      
let ascending = false;

function sortBy(type) {
  ascending = !ascending;

  wanderers.sort((a, b) => {
    return ascending
      ? a[type] - b[type]
      : b[type] - a[type];
  });

  renderGallery();
}
}
}
    <div class="controls">
      <button onclick="sortBy('distance')">🧭 Afstand</button>
      <button onclick="sortBy('days')">🕒 Leeftijd</button>
    </div>

    
    // 📅 dagen
    const days = calcDays(startDate);

    html += `
      <div class="card" onclick="window.location.href='/object?code=${code}'">
        ${photo ? `<img src="${photo}">` : ""}
        <h3>${name}</h3>
        <div class="stat">🧭 ${totalDistance} km</div>
        <div class="stat">🕒 ${days}</div>
        <div class="small">${code}</div>
      </div>
    `;
  });

  gallery.innerHTML = html;

})
.catch(err => {

});
